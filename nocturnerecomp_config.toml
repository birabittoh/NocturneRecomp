# nocturnerecomp - ReXGlue codegen config
#
# Add named functions (indirect-call targets), midasm hooks, and CRT
# addresses here once they are located in assets/default.xex.
#
# Example:
#   [functions]
#   0x8XXXXXXX = {name = "MyFunction"}
#
#   [[midasm_hook]]
#   address = 0x8XXXXXXX
#   name = "MyHook"
#   registers = ["r3"]
#   return = true
#
#   [rexcrt]
#   memcpy  = 0x8XXXXXXX
#   memset  = 0x8XXXXXXX
#   memmove = 0x8XXXXXXX

[functions]
0x8282AEF0 = {}
0x82286638 = {}

[rexcrt]
memcpy  = 0x825E3300
memmove = 0x825E37D0
memset  = 0x825E2740

# sub_825252C8 is the guest's generic "wait for the GPU to catch up" ring/pool
# primitive (see docs/native-renderer-headless-boot.md). It polls a
# GPU-driven counter that only a real GraphicsSystem ever advances. When
# headless there's no GPU to wait for, so bypass the wait entirely instead
# of trying to emulate every counter it might poll.
[[midasm_hook]]
address = 0x825252C8
name = "HeadlessRingWaitBypass"
return_on_true = true

[[midasm_hook]]
address = 0x82524330
name = "HeadlessRingWaitBypass"
return_on_true = true
